version: '3.8'

services:
  # FastAPI Backend
  backend:
    build: .
    container_name: spotter_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://spotter:spotter123@postgres:5432/spotter
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
    volumes:
      - ./app:/app/app
      - ./models:/app/models
    depends_on:
      - postgres
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: spotter_postgres
    environment:
      - POSTGRES_USER=spotter
      - POSTGRES_PASSWORD=spotter123
      - POSTGRES_DB=spotter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: spotter_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # pgAdmin (optional - for database management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: spotter_pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@spotter.com
      - PGADMIN_DEFAULT_PASSWORD=admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data: